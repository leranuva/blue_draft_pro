    <!-- Blueprint lines -->
    <line x1="6" y1="9" x2="24" y2="9" stroke="#003366" stroke-width="1.5"/>
    <line x1="6" y1="15" x2="21" y2="15" stroke="#336699" stroke-width="1.2"/>
    <line x1="6" y1="21" x2="24" y2="21" stroke="#003366" stroke-width="1.5"/>
    <line x1="6" y1="27" x2="18" y2="27" stroke="#336699" stroke-width="1.2"/>
    <!-- Corner fold detail -->
    <path d="M 0 0 L 9 0 L 0 9 Z" fill="#336699" opacity="0.4"/>
